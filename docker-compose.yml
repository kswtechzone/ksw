services:
  postgres:
    image: postgres:16-alpine
    container_name: ksw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ksw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ksw_password}
      POSTGRES_DB: ${POSTGRES_DB:-ksw_website}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ksw-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ksw} -d ${POSTGRES_DB:-ksw_website}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ksw-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - ksw-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ksw-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ksw}:${POSTGRES_PASSWORD:-ksw_password}@postgres:5432/${POSTGRES_DB:-ksw_website}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-"KSW TechZone <noreply@kswtechzone.com>"}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kswtechzone.com}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://kswtechzone.com}
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-hello@kswtechzone.com}
      NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE:-+977-9863198323}
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ksw-network

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: ksw-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    depends_on:
      - frontend
    networks:
      - ksw-network

  certbot:
    image: certbot/certbot
    container_name: ksw-certbot
    volumes:
      - certbot_data:/var/www/certbot
      - ./docker/nginx/ssl:/etc/letsencrypt
    depends_on:
      - nginx
    entrypoint: > 
      /bin/sh -c 'trap exit TERM; while :; do 
        certbot renew --webroot -w /var/www/certbot; 
        sleep 12h & wait $${!}; 
      done;'

volumes:
  postgres_data:
  redis_data:
  certbot_data:

networks:
  ksw-network:
    driver: bridge
